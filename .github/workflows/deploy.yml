name: Deploy to Hostinger

on:
  push:
    branches:
      - main # O workflow será acionado quando algo for enviado para a branch 'main'
  workflow_dispatch: # Permite rodar manualmente pelo site do GitHub

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🟢 Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🏗️ Build Project
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: 🔍 Verify Build Folder
        run: ls -la dist/

      - name: 📂 Sync files (Deploy to Hostinger)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/ # O diretório de build do Vite
          server-dir: ./
          dangerous-clean-slate: true # Garante que o servidor fique igual ao build local
